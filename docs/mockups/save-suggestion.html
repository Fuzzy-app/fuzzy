<!doctype html>
<html lang="ja">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Fuzzy 保存先サジェストモック</title>
	<style>
		:root {
			color-scheme: light;
			--nav: #171b2d;
			--nav-muted: #8b92ad;
			--panel: #ffffff;
			--page: #f3f5fb;
			--line: #e1e5f0;
			--text: #202537;
			--muted: #6d7488;
			--primary: #5b5ff0;
			--primary-soft: #ececff;
			--success: #20b486;
			--success-soft: #e2f8ef;
			--warning: #f4b740;
			--pdf: #f25f5c;
			--doc: #4a7df0;
			--ppt: #e09a36;
			--zip: #6b7280;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			background: var(--page);
			color: var(--text);
			font-family:
				Inter, "Yu Gothic UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
		}

		button,
		input {
			font: inherit;
		}

		.app {
			display: grid;
			grid-template-columns: 176px minmax(0, 1fr);
			min-height: 100vh;
		}

		.sidebar {
			display: flex;
			flex-direction: column;
			gap: 18px;
			background: var(--nav);
			padding: 20px 14px;
			color: #fff;
		}

		.brand {
			display: flex;
			align-items: center;
			gap: 10px;
			font-size: 14px;
			font-weight: 700;
		}

		.brand-mark {
			display: grid;
			width: 28px;
			height: 28px;
			place-items: center;
			border-radius: 8px;
			background: var(--primary);
			font-size: 15px;
		}

		.nav-list {
			display: grid;
			gap: 6px;
			margin: 4px 0 0;
			padding: 0;
			list-style: none;
		}

		.nav-item {
			display: flex;
			align-items: center;
			gap: 9px;
			min-height: 34px;
			border-radius: 7px;
			padding: 8px 10px;
			color: var(--nav-muted);
			font-size: 12px;
			font-weight: 700;
		}

		.nav-item.active {
			background: #303759;
			color: #fff;
		}

		.nav-icon {
			width: 10px;
			height: 10px;
			border-radius: 3px;
			background: currentColor;
			opacity: 0.8;
		}

		.status {
			margin-top: auto;
			border-radius: 9px;
			background: #222842;
			padding: 12px;
			color: #dce1f2;
			font-size: 11px;
			line-height: 1.45;
		}

		.status-dot {
			display: inline-block;
			width: 9px;
			height: 9px;
			margin-right: 7px;
			border-radius: 999px;
			background: var(--success);
			vertical-align: -1px;
		}

		.main {
			padding: 28px 32px 34px;
		}

		.topbar {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 16px;
			margin-bottom: 22px;
		}

		.eyebrow {
			margin: 0 0 6px;
			color: var(--muted);
			font-size: 12px;
			font-weight: 700;
		}

		h1 {
			margin: 0;
			font-size: 24px;
			line-height: 1.25;
			letter-spacing: 0;
		}

		.mode {
			border: 1px solid var(--line);
			border-radius: 999px;
			background: var(--panel);
			padding: 8px 12px;
			color: var(--success);
			font-size: 12px;
			font-weight: 700;
			white-space: nowrap;
		}

		.layout {
			display: grid;
			grid-template-columns: minmax(0, 1fr) 380px;
			gap: 16px;
		}

		.panel {
			border: 1px solid var(--line);
			border-radius: 8px;
			background: var(--panel);
			box-shadow: 0 14px 34px rgba(41, 47, 79, 0.08);
			overflow: hidden;
		}

		.panel-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			border-bottom: 1px solid var(--line);
			padding: 16px 18px;
		}

		.panel-title {
			margin: 0;
			font-size: 15px;
			font-weight: 900;
		}

		.count-pill {
			border-radius: 999px;
			background: var(--primary-soft);
			padding: 6px 10px;
			color: var(--primary);
			font-size: 12px;
			font-weight: 900;
			white-space: nowrap;
		}

		.file-list,
		.suggestion-list {
			display: grid;
			gap: 10px;
			padding: 14px 18px 18px;
		}

		.file-row {
			display: grid;
			grid-template-columns: auto auto minmax(0, 1fr) auto;
			gap: 12px;
			align-items: center;
			border: 1px solid var(--line);
			border-radius: 8px;
			background: #fff;
			padding: 12px;
		}

		.file-row input {
			width: 16px;
			height: 16px;
			accent-color: var(--primary);
		}

		.file-type {
			display: grid;
			width: 40px;
			height: 28px;
			place-items: center;
			border-radius: 7px;
			color: #fff;
			font-size: 10px;
			font-weight: 900;
		}

		.file-type.pdf {
			background: var(--pdf);
		}

		.file-type.docx {
			background: var(--doc);
		}

		.file-type.pptx {
			background: var(--ppt);
		}

		.file-type.zip {
			background: var(--zip);
		}

		.file-main {
			min-width: 0;
		}

		.file-name {
			margin: 0 0 4px;
			font-size: 14px;
			font-weight: 900;
		}

		.file-meta {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			color: var(--muted);
			font-size: 12px;
			font-weight: 700;
		}

		.file-size {
			color: var(--muted);
			font-size: 12px;
			font-weight: 800;
			white-space: nowrap;
		}

		.suggestion-option {
			display: grid;
			grid-template-columns: auto minmax(0, 1fr);
			gap: 12px;
			align-items: start;
			border: 1px solid var(--line);
			border-radius: 8px;
			background: #fff;
			padding: 12px;
			cursor: pointer;
		}

		.suggestion-option.selected {
			border-color: var(--primary);
			background: #fbfbff;
			box-shadow: 0 8px 20px rgba(91, 95, 240, 0.12);
		}

		.suggestion-option input {
			margin-top: 3px;
			accent-color: var(--primary);
		}

		.suggestion-path {
			margin: 0 0 8px;
			font-size: 13px;
			font-weight: 900;
			line-height: 1.5;
			word-break: break-all;
		}

		.confidence {
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto;
			gap: 8px;
			align-items: center;
			color: var(--muted);
			font-size: 12px;
			font-weight: 800;
		}

		.confidence-bar {
			height: 8px;
			border-radius: 999px;
			background: #edf0f7;
			overflow: hidden;
		}

		.confidence-fill {
			display: block;
			height: 100%;
			border-radius: inherit;
			background: var(--primary);
		}

		.manual-box {
			display: grid;
			gap: 8px;
			border-top: 1px solid var(--line);
			padding: 16px 18px 18px;
		}

		.manual-box label {
			color: var(--muted);
			font-size: 12px;
			font-weight: 900;
		}

		.manual-box input {
			width: 100%;
			min-height: 42px;
			border: 1px solid var(--line);
			border-radius: 8px;
			padding: 0 12px;
			color: var(--text);
			font-size: 13px;
		}

		.action-panel {
			display: grid;
			gap: 14px;
			padding: 16px 18px 18px;
		}

		.save-summary {
			border-radius: 8px;
			background: var(--primary-soft);
			padding: 12px;
			color: #34398e;
			font-size: 12px;
			font-weight: 800;
			line-height: 1.6;
		}

		.save-button {
			min-height: 44px;
			border: 0;
			border-radius: 8px;
			background: var(--primary);
			color: #fff;
			font-size: 14px;
			font-weight: 900;
			cursor: pointer;
		}

		.save-button:disabled {
			background: #c6cad8;
			cursor: not-allowed;
		}

		.result-message {
			display: none;
			border-radius: 8px;
			background: var(--success-soft);
			padding: 12px;
			color: #087457;
			font-size: 12px;
			font-weight: 900;
			line-height: 1.6;
		}

		.result-message.visible {
			display: block;
		}

		@media (max-width: 980px) {
			.app,
			.layout {
				grid-template-columns: 1fr;
			}

			.sidebar {
				display: none;
			}
		}

		@media (max-width: 640px) {
			.main {
				padding: 20px;
			}

			.topbar,
			.panel-header,
			.file-row {
				display: grid;
			}

			.file-type,
			.file-size {
				width: fit-content;
			}
		}
	</style>
</head>
<body>
	<div class="app">
		<aside class="sidebar" aria-label="Fuzzy ナビゲーション">
			<div class="brand">
				<span class="brand-mark">F</span>
				<span>Fuzzy</span>
			</div>
			<ul class="nav-list">
				<li class="nav-item"><span class="nav-icon"></span>ダッシュボード</li>
				<li class="nav-item"><span class="nav-icon"></span>横断検索</li>
				<li class="nav-item"><span class="nav-icon"></span>締切ハブ</li>
				<li class="nav-item"><span class="nav-icon"></span>コース一覧</li>
				<li class="nav-item active"><span class="nav-icon"></span>資料の整理</li>
			</ul>
			<div class="status"><span class="status-dot"></span>Moodleページ検出<br />保存候補を表示</div>
		</aside>

		<main class="main">
			<div class="topbar">
				<div>
					<p class="eyebrow">保存先サジェスト</p>
					<h1>資料の保存先を選ぶ</h1>
				</div>
				<div class="mode">コース: データベース / 第4回</div>
			</div>

			<div class="layout">
				<section class="panel" aria-label="保存対象ファイル">
					<div class="panel-header">
						<h2 class="panel-title">保存する資料</h2>
						<span id="selectedCount" class="count-pill">0件選択中</span>
					</div>
					<div id="fileList" class="file-list"></div>
				</section>

				<section class="panel" aria-label="保存先候補">
					<div class="panel-header">
						<h2 class="panel-title">保存先候補</h2>
						<span class="count-pill">確からしさ順</span>
					</div>
					<div id="suggestionList" class="suggestion-list"></div>
					<div class="manual-box">
						<label for="manualPath">手動で指定</label>
						<input
							id="manualPath"
							type="text"
							placeholder="C:\Users\sample\Documents\大学\2026前期\データベース"
						/>
					</div>
					<div class="action-panel">
						<div id="saveSummary" class="save-summary"></div>
						<button id="saveButton" class="save-button" type="button">選択した資料を保存</button>
						<div id="resultMessage" class="result-message"></div>
					</div>
				</section>
			</div>
		</main>
	</div>

	<script>
		const moodleSnapshot = {
			courseId: 2,
			courseName: "データベース",
			sectionTitle: "第4回",
			files: [
				{
					id: "file-1234",
					title: "第4回_正規化.pdf",
					url: "https://moodle.example/pluginfile.php/1234/mod_resource/content/1/file.pdf",
					sectionTitle: "第4回",
					size: "1.8 MB",
				},
				{
					id: "file-1235",
					title: "正規化_演習.docx",
					url: "https://moodle.example/pluginfile.php/1235/mod_resource/content/1/file.docx",
					sectionTitle: "第4回",
					size: "420 KB",
				},
				{
					id: "file-1299",
					title: "正規化_メモ.zip",
					url: "https://moodle.example/pluginfile.php/1299/mod_folder/content/0/memo.zip",
					sectionTitle: "補足資料",
					size: "3.2 MB",
				},
			],
		};

		const suggestions = [
			{
				path: "C:\\Users\\sample\\Documents\\大学\\2026前期\\データベース\\第4回",
				confidence: 0.92,
			},
			{
				path: "C:\\Users\\sample\\Documents\\大学\\2026前期\\データベース",
				confidence: 0.6,
			},
			{
				path: "C:\\Users\\sample\\Downloads\\Moodle\\データベース",
				confidence: 0.34,
			},
		].sort((a, b) => b.confidence - a.confidence);

		let selectedFileIds = new Set(moodleSnapshot.files.map((file) => file.id));
		let selectedPath = suggestions[0].path;
		let selectedPathSource = "suggestion";

		const fileList = document.getElementById("fileList");
		const suggestionList = document.getElementById("suggestionList");
		const selectedCount = document.getElementById("selectedCount");
		const manualPath = document.getElementById("manualPath");
		const saveSummary = document.getElementById("saveSummary");
		const saveButton = document.getElementById("saveButton");
		const resultMessage = document.getElementById("resultMessage");

		function getFileType(fileName) {
			return fileName.split(".").pop()?.toLowerCase() ?? "file";
		}

		function renderFiles() {
			fileList.innerHTML = "";

			for (const file of moodleSnapshot.files) {
				const row = document.createElement("label");
				const fileType = getFileType(file.title);
				row.className = "file-row";
				row.innerHTML = `
					<input type="checkbox" data-file-id="${file.id}" ${
						selectedFileIds.has(file.id) ? "checked" : ""
					} />
					<span class="file-type ${fileType}">${fileType.toUpperCase()}</span>
					<span class="file-main">
						<p class="file-name">${file.title}</p>
						<span class="file-meta">
							<span>${moodleSnapshot.courseName}</span>
							<span>${file.sectionTitle}</span>
						</span>
					</span>
					<span class="file-size">${file.size}</span>
				`;
				fileList.appendChild(row);
			}

			for (const checkbox of fileList.querySelectorAll("input[type='checkbox']")) {
				checkbox.addEventListener("change", (event) => {
					const fileId = event.target.dataset.fileId;
					if (event.target.checked) {
						selectedFileIds.add(fileId);
					} else {
						selectedFileIds.delete(fileId);
					}
					resultMessage.classList.remove("visible");
					renderSummary();
				});
			}
		}

		function renderSuggestions() {
			suggestionList.innerHTML = "";

			for (const suggestion of suggestions) {
				const label = document.createElement("label");
				const confidencePercent = Math.round(suggestion.confidence * 100);
				label.className = `suggestion-option ${
					selectedPathSource === "suggestion" && selectedPath === suggestion.path ? "selected" : ""
				}`;
				label.innerHTML = `
					<input type="radio" name="savePath" value="${suggestion.path}" ${
						selectedPath === suggestion.path ? "checked" : ""
					} />
					<span>
						<p class="suggestion-path">${suggestion.path}</p>
						<span class="confidence">
							<span class="confidence-bar">
								<span class="confidence-fill" style="width: ${confidencePercent}%"></span>
							</span>
							<span>${confidencePercent}%</span>
						</span>
					</span>
				`;
				suggestionList.appendChild(label);
			}

			for (const radio of suggestionList.querySelectorAll("input[type='radio']")) {
				radio.addEventListener("change", (event) => {
					selectedPath = event.target.value;
					selectedPathSource = "suggestion";
					manualPath.value = "";
					resultMessage.classList.remove("visible");
					renderSuggestions();
					renderSummary();
				});
			}
		}

		function renderSummary() {
			const files = moodleSnapshot.files.filter((file) => selectedFileIds.has(file.id));
			const path = manualPath.value.trim() || selectedPath;
			selectedCount.textContent = `${files.length}件選択中`;
			saveButton.disabled = files.length === 0 || !path;
			saveSummary.textContent =
				files.length === 0
					? "保存する資料を選択してください。"
					: `${files.length}件を ${path} に保存します。`;
		}

		manualPath.addEventListener("input", () => {
			const value = manualPath.value.trim();
			if (value) {
				selectedPath = value;
				selectedPathSource = "manual";
			} else {
				selectedPath = suggestions[0].path;
				selectedPathSource = "suggestion";
			}
			resultMessage.classList.remove("visible");
			renderSuggestions();
			renderSummary();
		});

		saveButton.addEventListener("click", () => {
			const files = moodleSnapshot.files.filter((file) => selectedFileIds.has(file.id));
			const path = manualPath.value.trim() || selectedPath;
			if (files.length === 0 || !path) {
				return;
			}
			resultMessage.textContent = `${files.length}件の保存先を決定しました。保存先: ${path}`;
			resultMessage.classList.add("visible");
		});

		renderFiles();
		renderSuggestions();
		renderSummary();
	</script>
</body>
</html>
