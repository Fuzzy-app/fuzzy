# -----------------------------------------------------------------------------
# ワークフロー仕様: PR Issue Link Check
# -----------------------------------------------------------------------------
# 目的:
# - ソースブランチ名に "issue" を含むPRで、PR Development の Linked issues を
#   1件以上必須にする。
#
# トリガー:
# - pull_request_target: opened, reopened, synchronize, edited
#
# 主要ルール:
# 1. `contains(github.head_ref, 'issue')` が true の場合のみ実行する。
# 2. PR Development から親Issue（Linked issues）を取得する。
# 3. 親Issueが0件の場合はジョブを失敗させる。
# 4. 親Issueが1件以上ある場合:
#    - 可観測性のためSubIssue件数を取得する
#    - ジョブを成功させる
# 5. API取得失敗時は fail-closed として失敗させる。
# -----------------------------------------------------------------------------
name: PR Issue Link Check

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check-linked-issues:
    if: contains(github.head_ref, 'issue')
    runs-on: ubuntu-latest
    steps:
      - name: Validate linked issues in Development
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            // PRのDevelopment欄に連携されたIssue（Linked issues）を取得する。
            const query = `
              query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    closingIssuesReferences(first: 100) {
                      nodes {
                        number
                        title
                      }
                    }
                  }
                }
              }
            `;

            let linkedIssues = [];
            try {
              // Development連携Issueの取得に失敗したら判定不能としてfail-closedにする。
              const result = await github.graphql(query, { owner, repo, prNumber });
              linkedIssues = result.repository.pullRequest.closingIssuesReferences.nodes ?? [];
            } catch (error) {
              core.setFailed(`Linked issue lookup failed: ${error.message}`);
              return;
            }

            // issue系ブランチでは、少なくとも1件のLinked issueを必須にする。
            if (linkedIssues.length === 0) {
              core.setFailed('No linked issue in PR Development section while branch name includes "issue".');
              return;
            }

            let totalSubIssueCount = 0;
            for (const issue of linkedIssues) {
              try {
                // 各親Issueに紐づくSubIssueを取得し、集計して可観測性を上げる。
                const subIssues = await github.paginate(
                  'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                  {
                    owner,
                    repo,
                    issue_number: issue.number,
                    per_page: 100
                  }
                );
                totalSubIssueCount += subIssues.length;
              } catch (error) {
                core.setFailed(`Sub-issue lookup failed for #${issue.number}: ${error.message}`);
                return;
              }
            }

            const linkedIssueList = linkedIssues.map((issue) => `#${issue.number}`).join(', ');
            core.info(`Linked issues: ${linkedIssueList}`);
            core.info(`Total sub-issues: ${totalSubIssueCount}`);
            core.notice(`Linked issue validation passed. Linked issues: ${linkedIssueList}; sub-issues: ${totalSubIssueCount}`);
