# -----------------------------------------------------------------------------
# ワークフロー仕様: PR Sync Linked Issue Labels
# -----------------------------------------------------------------------------
# 目的:
# - PRと、そのPRに紐づくIssue/SubIssue間で管理対象ラベルを同期する。
# - 管理対象ラベル:
#   - 作業区分: admin-page, pc-page, mobile-page, public-page, backend
#   - 緊急度: critical, high, medium, low
# - 管理対象外ラベル（例: bug/enhancement）は変更しない。
#
# トリガー:
# - pull_request_target: opened, reopened, synchronize, edited, labeled, unlabeled
# - issues: labeled, unlabeled, edited
#
# 主要ルール:
# 1. pull_request_target イベント:
#    - ソースブランチ名に "issue" を含むPRのみ処理する。
#    - PR Development から親Issue（Linked issues）を取得する。
# 2. issues イベント:
#    - 変更Issueの影響を受ける open PR（issue系ブランチのみ）を探索する:
#      - 変更Issueが親IssueとしてLinkedされている
#      - 変更IssueがLinked親IssueのSubIssueである
# 3. 親Issue+SubIssue全体から同期用ラベルを合成する:
#    - 作業区分ラベルは OR 同期（和集合）
#    - 緊急度ラベルは最上位優先度を1件のみ採用
#      （critical > high > medium > low）
# 4. 各対象PRへ、管理対象ラベルを差分同期（追加/除去）する。
# -----------------------------------------------------------------------------
name: PR Sync Linked Issue Labels

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled
      - unlabeled
  issues:
    types:
      - labeled
      - unlabeled
      - edited

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync-linked-issue-labels:
    if: github.event_name == 'issues' || contains(github.head_ref, 'issue')
    runs-on: ubuntu-latest
    steps:
      - name: Sync labels from linked issues and sub-issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 同期対象となる管理ラベル定義。
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const WORK_TYPE_LABELS = ['admin-page', 'pc-page', 'mobile-page', 'public-page', 'backend'];
            const URGENCY_LABELS = ['critical', 'high', 'medium', 'low'];
            const URGENCY_RANK = { critical: 0, high: 1, medium: 2, low: 3 };
            const MANAGED_LABELS = [...WORK_TYPE_LABELS, ...URGENCY_LABELS];

            // PRのDevelopment欄に紐づく親Issueを取得する。
            const getLinkedParentIssues = async (prNumber) => {
              const query = `
                query($owner: String!, $repo: String!, $prNumber: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $prNumber) {
                      closingIssuesReferences(first: 100) {
                        nodes {
                          number
                        }
                      }
                    }
                  }
                }
              `;
              const result = await github.graphql(query, { owner, repo, prNumber });
              return result.repository.pullRequest.closingIssuesReferences.nodes ?? [];
            };

            // 親Issueに紐づくSubIssue番号を列挙する。
            const getSubIssueNumbers = async (issueNumber) => {
              const subIssues = await github.paginate(
                'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                {
                  owner,
                  repo,
                  issue_number: issueNumber,
                  per_page: 100
                }
              );
              return subIssues.map((subIssue) => subIssue.number);
            };

            // Issue/PRのラベル配列を文字列リストへ正規化する。
            const getIssueLabels = async (issueNumber) => {
              const issue = await github.rest.issues.get({
                owner,
                repo,
                issue_number: issueNumber
              });
              return issue.data.labels
                .map((label) => (typeof label === 'string' ? label : label.name))
                .filter(Boolean);
            };

            // 親Issue+SubIssue全体から、PRへ適用すべき管理ラベル集合を計算する。
            // - 作業区分はOR（和集合）
            // - 緊急度は最優先の1件（critical > high > medium > low）
            const computeDesiredManagedLabels = async (parentIssues) => {
              const workTypeSet = new Set();
              let selectedUrgency = null;

              const allIssueNumbers = new Set();
              for (const parent of parentIssues) {
                allIssueNumbers.add(parent.number);
                const subIssueNumbers = await getSubIssueNumbers(parent.number);
                for (const subIssueNumber of subIssueNumbers) allIssueNumbers.add(subIssueNumber);
              }

              for (const issueNumber of allIssueNumbers) {
                const labels = await getIssueLabels(issueNumber);
                for (const label of labels) {
                  if (WORK_TYPE_LABELS.includes(label)) {
                    workTypeSet.add(label);
                  }
                  if (URGENCY_LABELS.includes(label)) {
                    if (!selectedUrgency || URGENCY_RANK[label] < URGENCY_RANK[selectedUrgency]) {
                      selectedUrgency = label;
                    }
                  }
                }
              }

              const desired = [...workTypeSet];
              if (selectedUrgency) desired.push(selectedUrgency);
              return desired;
            };

            // 1つのPRに対して管理ラベルを差分同期する（追加+除去）。
            const syncOnePr = async (prNumber) => {
              const parentIssues = await getLinkedParentIssues(prNumber);
              if (parentIssues.length === 0) {
                core.notice(`PR #${prNumber}: no linked issues found. Skipping label sync.`);
                return;
              }

              const desiredManagedLabels = await computeDesiredManagedLabels(parentIssues);
              const currentPr = await github.rest.issues.get({
                owner,
                repo,
                issue_number: prNumber
              });
              const currentLabels = currentPr.data.labels
                .map((label) => (typeof label === 'string' ? label : label.name))
                .filter(Boolean);

              const currentManaged = currentLabels.filter((label) => MANAGED_LABELS.includes(label));
              const toAdd = desiredManagedLabels.filter((label) => !currentManaged.includes(label));
              const toRemove = currentManaged.filter((label) => !desiredManagedLabels.includes(label));

              if (toAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: toAdd
                });
              }

              for (const label of toRemove) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: prNumber,
                    name: label
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }

              core.notice(
                `PR #${prNumber}: synced managed labels. desired=[${desiredManagedLabels.join(', ') || '(none)'}], added=[${toAdd.join(', ') || '(none)'}], removed=[${toRemove.join(', ') || '(none)'}]`
              );
            };

            // PRイベント時は当該PRのみを同期する。
            if (context.eventName === 'pull_request_target') {
              const prNumber = context.payload.pull_request.number;
              await syncOnePr(prNumber);
              return;
            }

            // Issueイベント時は、変更Issueに影響を受けるPRを探索して再同期する。
            const changedIssueNumber = context.payload.issue.number;
            const openPrs = await github.paginate(
              'GET /repos/{owner}/{repo}/pulls',
              { owner, repo, state: 'open', per_page: 100 }
            );
            const affectedPrNumbers = new Set();

            for (const pr of openPrs) {
              if (!pr.head?.ref?.includes('issue')) continue;
              const linkedParents = await getLinkedParentIssues(pr.number);
              if (linkedParents.some((parent) => parent.number === changedIssueNumber)) {
                affectedPrNumbers.add(pr.number);
                continue;
              }
              for (const parent of linkedParents) {
                const subIssueNumbers = await getSubIssueNumbers(parent.number);
                if (subIssueNumbers.includes(changedIssueNumber)) {
                  affectedPrNumbers.add(pr.number);
                  break;
                }
              }
            }

            if (affectedPrNumbers.size === 0) {
              core.notice(`Issue #${changedIssueNumber}: no affected PR found.`);
              return;
            }

            for (const prNumber of affectedPrNumbers) {
              await syncOnePr(prNumber);
            }
